<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Dancehall on the Bayou</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { background: #0d0800; }

  body {
    font-family: 'Georgia', serif;
    color: #f0e8d0;
    background: transparent;
    min-height: 100vh;
  }

  /* Fixed background layer — pointer-events off so it never blocks scroll or taps */
  #bg {
    position: fixed;
    inset: 0;
    background-image: url('708616044_1631812425451533_4297030253631931157_n.jpg');
    background-size: cover;
    background-position: center 30%;
    z-index: 0;
    pointer-events: none;
  }

  /* Dark overlay */
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(5, 2, 0, 0.62);
  }

  /* Scrollable content sits above fixed bg */
  #ui {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 28px 80px;
    gap: 52px;
  }

  #title { text-align: center; }

  #eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d4aa70;
    margin-bottom: 10px;
  }

  #main-title {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.25;
    color: #fff8ee;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.9);
  }

  #main-title em {
    font-style: italic;
    color: #f0c070;
  }

  #center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 320px;
  }

  #play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(240, 200, 100, 0.6);
    background: rgba(10, 5, 0, 0.65);
    color: #f0c070;
    font-size: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  #progress-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  #progress-track {
    width: 100%;
    height: 3px;
    background: rgba(240, 200, 100, 0.2);
    border-radius: 2px;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: #f0c070;
    border-radius: 2px;
    width: 0%;
  }

  #time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #c8a060;
    font-family: 'Courier New', monospace;
  }

  #motion-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  #orientation-hint {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(240,200,100,0.09);
    border: 1px solid rgba(240,200,100,0.28);
    border-radius: 10px;
    padding: 14px 16px;
    width: 100%;
  }

  #orientation-text {
    font-size: 13px;
    color: #ffe8b0;
    line-height: 1.55;
  }

  #orientation-text strong { color: #ffffff; }

  #compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #compass {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid rgba(240,200,100,0.3);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #compass-needle {
    width: 2px;
    height: 28px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) translateY(-100%) rotate(0deg);
  }

  #needle-top {
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 16px solid #f0c070;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #needle-bottom {
    width: 2px;
    height: 14px;
    background: #6a5040;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(240,200,100,0.5);
  }

  #compass-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c8a060;
  }

  #pan-readout {
    font-size: 12px;
    color: #d4aa70;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
  }

  #motion-btn {
    padding: 13px 30px;
    border-radius: 24px;
    border: 1px solid rgba(240, 200, 100, 0.45);
    background: rgba(10, 5, 0, 0.65);
    color: #f0c070;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: 'Georgia', serif;
    -webkit-tap-highlight-color: transparent;
  }

  #motion-hint {
    font-size: 12px;
    color: #c8a060;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="bg"></div>

<div id="ui">
  <div id="title">
    <div id="eyebrow">An immersive listening experience</div>
    <h1 id="main-title">A Dancehall<br>on the <em>Bayou</em></h1>
  </div>

  <div id="center">
    <button id="play-btn" aria-label="Play">&#9654;</button>
    <div id="progress-area">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="time-row">
        <span id="t-current">0:00</span>
        <span id="t-total">--:--</span>
      </div>
    </div>
  </div>

  <div id="motion-area">
    <div id="orientation-hint">
      <svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect x="8" y="12" width="28" height="12" rx="2.5" stroke="#f0c070" stroke-width="1.4" fill="none"/>
        <circle cx="33" cy="18" r="1.2" fill="#f0c070" opacity="0.6"/>
        <path d="M7 18 Q3 10 7 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M7 4 L5 7 M7 4 L10 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <path d="M37 18 Q41 10 37 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M37 4 L39 7 M37 4 L34 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div id="orientation-text">Move your phone left or right to slide the pan position</div>
    </div>

    <div id="compass-wrap">
      <div id="compass">
        <div id="compass-needle">
          <div id="needle-top"></div>
          <div id="needle-bottom"></div>
        </div>
        <div id="compass-dot"></div>
      </div>
      <div id="compass-label">Direction</div>
      <div id="pan-readout">Center</div>
    </div>

    <button id="motion-btn">Enable motion control</button>
    <div id="motion-hint">Move left or right to slide the music through the stereo field</div>
  </div>
</div>

<audio id="audio" src="11_dance_hall.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const progressFill = document.getElementById('progress-fill');
  const progressTrack = document.getElementById('progress-track');
  const tCurrent = document.getElementById('t-current');
  const tTotal = document.getElementById('t-total');
  const compassNeedle = document.getElementById('compass-needle');
  const panReadout = document.getElementById('pan-readout');
  const motionBtn = document.getElementById('motion-btn');
  const motionHint = document.getElementById('motion-hint');

  const actx = new (window.AudioContext || window.webkitAudioContext)();
  const panner = actx.createStereoPanner();
  const src = actx.createMediaElementSource(audio);
  src.connect(panner);
  panner.connect(actx.destination);

  let smoothedPan = 0;
  const SMOOTHING = 0.88;

  // Continuous pan position. This is intentionally persistent:
  // motion changes it, but it does not drift back to center.
  let panPosition = 0;

  // Landscape left/right movement is often the y axis.
  // Gesture-based motion mapping.
  // This is better than continuously integrating the accelerometer because
  // a real hand movement has a braking spike in the opposite direction.
  // We use the FIRST strong impulse as the gesture direction, then ignore
  // the rebound for a short window.
  const MOTION_AXIS = 'y';       // try 'x' if the readout barely changes in landscape
  const MOTION_SIGN = 1;         // change to -1 if left/right are reversed

  // TUNING VALUES
  const CALIBRATION_MS = 650;    // neutral baseline time after enabling motion
  const DEADZONE = 0.22;         // lower = more sensitive to small gestures
  const GESTURE_WINDOW_MS = 260; // shorter = responds to smaller/shorter gestures
  const COOLDOWN_MS = 80;        // prevents double-triggering from one motion
  const MIN_GESTURE_STEP = 0.075;// smallest pan nudge per recognized gesture
  const MAX_GESTURE_STEP = 0.30; // largest pan nudge per recognized gesture
  const GESTURE_RANGE = 1.35;    // lower = smaller gestures move pan more
  const BASELINE_SMOOTHING = 0.998;
  const DISPLAY_SMOOTHING = 0.78;
  const QUIET_RESET = 0.12;      // helps arm the next tiny gesture after stillness

  let motionBaseline = null;
  let calibrationStart = 0;
  let calibrated = false;

  let gestureActive = false;
  let gestureSign = 0;
  let gesturePeak = 0;
  let gestureStart = 0;
  let lastGestureEnd = 0;
  let displayMotion = 0;
  let quietSince = 0;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', () => { tTotal.textContent = fmt(audio.duration); });
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    tCurrent.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('ended', () => { playBtn.innerHTML = '&#9654;'; });

  playBtn.addEventListener('click', () => {
    if (actx.state === 'suspended') actx.resume();
    if (audio.paused) {
      audio.play();
      playBtn.innerHTML = '&#9646;&#9646;';
    } else {
      audio.pause();
      playBtn.innerHTML = '&#9654;';
    }
  });

  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  function setPan(val) {
    val = Math.max(-1, Math.min(1, val));
    smoothedPan = smoothedPan * SMOOTHING + val * (1 - SMOOTHING);
    panner.pan.value = smoothedPan;
    const deg = smoothedPan * 90;
    compassNeedle.style.transform = `translateX(-50%) translateY(-100%) rotate(${deg}deg)`;
    panReadout.textContent = smoothedPan < -0.1 ? 'Left' : smoothedPan > 0.1 ? 'Right' : 'Center';
  }

  function getMotionAxis(e) {
    // Prefer gravity-removed acceleration when the browser provides it.
    // Fall back to accelerationIncludingGravity, but subtract a calibrated baseline.
    const plain = e.acceleration;
    if (plain && plain[MOTION_AXIS] !== null && plain[MOTION_AXIS] !== undefined) {
      return plain[MOTION_AXIS] * MOTION_SIGN;
    }

    const withGravity = e.accelerationIncludingGravity;
    if (!withGravity || withGravity[MOTION_AXIS] === null || withGravity[MOTION_AXIS] === undefined) {
      return null;
    }

    const raw = withGravity[MOTION_AXIS];

    if (motionBaseline === null) {
      motionBaseline = raw;
      calibrationStart = performance.now();
      return 0;
    }

    if (!calibrated) {
      motionBaseline = motionBaseline * 0.92 + raw * 0.08;
      if (performance.now() - calibrationStart >= CALIBRATION_MS) {
        calibrated = true;
        motionHint.textContent = 'Ready. Move left or right to slide the pan.';
      }
      return 0;
    }

    // Very slow baseline tracking removes orientation/gravity bias without
    // chasing quick hand gestures.
    motionBaseline = motionBaseline * BASELINE_SMOOTHING + raw * (1 - BASELINE_SMOOTHING);
    return (raw - motionBaseline) * MOTION_SIGN;
  }

  function handleMotion(e) {
    const motion = getMotionAxis(e);
    if (motion === null) return;

    const now = performance.now();
    displayMotion = displayMotion * DISPLAY_SMOOTHING + motion * (1 - DISPLAY_SMOOTHING);

    if (!calibrated) {
      setPan(panPosition);
      motionHint.textContent = 'Calibrating neutral position... hold the phone still';
      return;
    }

    const absMotion = Math.abs(motion);
    const sign = Math.sign(motion);

    if (absMotion < QUIET_RESET) {
      if (!quietSince) quietSince = now;
    } else {
      quietSince = 0;
    }

    // Start a gesture on a small, clear impulse. The quiet reset makes
    // small motions more responsive without letting sensor noise run the pan.
    const hasBeenQuiet = quietSince && (now - quietSince > 50);
    if (!gestureActive && absMotion > DEADZONE && ((now - lastGestureEnd) > COOLDOWN_MS || hasBeenQuiet)) {
      gestureActive = true;
      gestureSign = sign;
      gesturePeak = absMotion;
      gestureStart = now;
    }

    if (gestureActive) {
      // Only track peaks in the original gesture direction.
      // This ignores the opposite braking/rebound spike.
      if (Math.sign(motion) === gestureSign) {
        gesturePeak = Math.max(gesturePeak, absMotion);
      }

      if (now - gestureStart >= GESTURE_WINDOW_MS) {
        const strength = Math.min(1, Math.max(0, (gesturePeak - DEADZONE) / (GESTURE_RANGE - DEADZONE)));
        const shaped = Math.pow(strength, 0.35); // boosts small gestures without full snapping
        const step = MIN_GESTURE_STEP + shaped * (MAX_GESTURE_STEP - MIN_GESTURE_STEP);

        panPosition += gestureSign * step;
        panPosition = Math.max(-1, Math.min(1, panPosition));

        gestureActive = false;
        lastGestureEnd = now;
      }
    }

    setPan(panPosition);

    motionHint.textContent =
      `axis: ${MOTION_AXIS} | motion: ${displayMotion.toFixed(2)} | pan: ${panPosition.toFixed(2)}`;

    audio.volume = 1;
  }

  compassNeedle.parentElement.addEventListener('click', () => {
    panPosition = 0;
    setPan(panPosition);
    motionHint.textContent = 'Centered. Move left or right to slide the pan again.';
  });

  motionBtn.addEventListener('click', async () => {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm === 'granted') startMotion();
        else motionHint.textContent = 'Motion permission denied.';
      } catch(e) {
        motionHint.textContent = 'Could not enable motion.';
      }
    } else if (window.DeviceMotionEvent) {
      startMotion();
    } else {
      motionHint.textContent = 'Motion not supported on this device.';
    }
  });

  function startMotion() {
    motionBtn.style.display = 'none';
    motionHint.textContent = 'Calibrating neutral position... hold the phone still';
    motionBaseline = null;
    calibrated = false;
    gestureActive = false;
    gesturePeak = 0;
    window.addEventListener('devicemotion', handleMotion);
  }
</script>
</body>
</html>
