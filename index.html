<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Dancehall on the Bayou</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d0800;
    font-family: 'Georgia', serif;
    color: #f0e8d0;
    touch-action: none;
  }

  #bg {
    position: fixed;
    inset: 0;
    background-image: url('708616044_1631812425451533_4297030253631931157_n.jpg');
    background-size: cover;
    background-position: center 30%;
    filter: brightness(0.38) sepia(0.25);
    z-index: 0;
    transition: filter 0.8s ease;
  }

  #bg.playing { filter: brightness(0.52) sepia(0.18); }

  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, transparent 20%, rgba(5,2,0,0.65) 80%);
    z-index: 1;
  }

  #ui {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 52px 28px 44px;
  }

  #title { text-align: center; }

  #eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d4aa70;
    margin-bottom: 10px;
  }

  #main-title {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.25;
    color: #fff8ee;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 12px rgba(0,0,0,0.8);
  }

  #main-title em {
    font-style: italic;
    color: #f0c070;
  }

  #center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  #play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(240, 200, 100, 0.6);
    background: rgba(10, 5, 0, 0.55);
    color: #f0c070;
    font-size: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  #play-btn:active {
    background: rgba(40, 20, 0, 0.7);
    border-color: rgba(240, 200, 100, 0.9);
  }

  #progress-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  #progress-track {
    width: 100%;
    height: 2px;
    background: rgba(240, 200, 100, 0.2);
    border-radius: 1px;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: #f0c070;
    border-radius: 1px;
    width: 0%;
    transition: width 0.15s linear;
  }

  #time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #c8a060;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }

  /* MOTION SECTION */
  #motion-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #orientation-hint {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(240,200,100,0.09);
    border: 1px solid rgba(240,200,100,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    width: 100%;
  }

  #orientation-text {
    font-size: 13px;
    color: #ffe8b0;
    line-height: 1.5;
  }

  #orientation-text strong { color: #fff; }

  /* Compass rose */
  #compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #compass {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid rgba(240,200,100,0.3);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #compass-needle {
    width: 2px;
    height: 28px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) translateY(-100%) rotate(0deg);
    transition: transform 0.1s ease;
  }

  #compass-needle-top {
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 16px solid #f0c070;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-needle-bottom {
    width: 2px;
    height: 14px;
    background: #6a5040;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(240,200,100,0.5);
    position: absolute;
  }

  #compass-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c8a060;
  }

  #pan-readout {
    font-size: 12px;
    color: #d4aa70;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
  }

  #motion-btn {
    padding: 10px 24px;
    border-radius: 20px;
    border: 1px solid rgba(240, 200, 100, 0.4);
    background: rgba(10, 5, 0, 0.5);
    color: #f0c070;
    font-size: 13px;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: 'Georgia', serif;
    -webkit-tap-highlight-color: transparent;
  }

  #motion-hint {
    font-size: 12px;
    color: #c8a060;
    text-align: center;
    line-height: 1.5;
    min-height: 16px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="vignette"></div>

<div id="ui">
  <div id="title">
    <div id="eyebrow">An immersive listening experience</div>
    <h1 id="main-title">A Dancehall<br>on the <em>Bayou</em></h1>
  </div>

  <div id="center">
    <button id="play-btn" aria-label="Play">&#9654;</button>
    <div id="progress-area">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="time-row">
        <span id="t-current">0:00</span>
        <span id="t-total">--:--</span>
      </div>
    </div>
  </div>

  <div id="motion-area">

    <div id="orientation-hint">
      <!-- Bird's eye view of phone sweeping left/right -->
      <svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg" flex-shrink="0" style="flex-shrink:0">
        <!-- Phone body top-down, landscape -->
        <rect x="8" y="12" width="28" height="12" rx="2.5" stroke="#f0c070" stroke-width="1.4" fill="none"/>
        <!-- Camera dot -->
        <circle cx="33" cy="18" r="1.2" fill="#f0c070" opacity="0.6"/>
        <!-- Left sweep arrow -->
        <path d="M7 18 Q3 10 7 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M7 4 L5 7 M7 4 L10 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <!-- Right sweep arrow -->
        <path d="M37 18 Q41 10 37 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M37 4 L39 7 M37 4 L34 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div id="orientation-text">Hold phone <strong>flat and horizontal</strong> — sweep left or right to pan the sound</div>
    </div>

    <div id="compass-wrap">
      <div id="compass">
        <div id="compass-needle">
          <div id="compass-needle-top"></div>
          <div id="compass-needle-bottom"></div>
        </div>
        <div id="compass-dot"></div>
      </div>
      <div id="compass-label">Direction</div>
      <div id="pan-readout">Center</div>
    </div>

    <button id="motion-btn">Enable motion control</button>
    <div id="motion-hint">Turn to find the music</div>

  </div>
</div>

<audio id="audio" src="11_dance_hall.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const bg = document.getElementById('bg');
  const playBtn = document.getElementById('play-btn');
  const progressFill = document.getElementById('progress-fill');
  const progressTrack = document.getElementById('progress-track');
  const tCurrent = document.getElementById('t-current');
  const tTotal = document.getElementById('t-total');
  const compassNeedle = document.getElementById('compass-needle');
  const panReadout = document.getElementById('pan-readout');
  const motionBtn = document.getElementById('motion-btn');
  const motionHint = document.getElementById('motion-hint');

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const panner = ctx.createStereoPanner();
  const src = ctx.createMediaElementSource(audio);
  src.connect(panner);
  panner.connect(ctx.destination);

  let alphaOffset = null;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', () => { tTotal.textContent = fmt(audio.duration); });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    tCurrent.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    playBtn.innerHTML = '&#9654;';
    bg.classList.remove('playing');
  });

  playBtn.addEventListener('click', () => {
    if (ctx.state === 'suspended') ctx.resume();
    if (audio.paused) {
      audio.play();
      playBtn.innerHTML = '&#9646;&#9646;';
      bg.classList.add('playing');
    } else {
      audio.pause();
      playBtn.innerHTML = '&#9654;';
      bg.classList.remove('playing');
    }
  });

  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  function setPan(val) {
    val = Math.max(-1, Math.min(1, val));
    panner.pan.value = val;
    const deg = val * 90;
    compassNeedle.style.transform = `translateX(-50%) translateY(-100%) rotate(${deg}deg)`;
    panReadout.textContent = val < -0.1 ? 'Left' : val > 0.1 ? 'Right' : 'Center';
  }

  setPan(0);

  function handleOrientation(e) {
    // alpha = compass heading 0-360 as you sweep phone horizontally
    if (e.alpha === null || e.alpha === undefined) return;

    if (alphaOffset === null) alphaOffset = e.alpha;

    let delta = e.alpha - alphaOffset;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;

    // 90 degrees of sweep = full pan left or right
    const pan = Math.max(-1, Math.min(1, delta / 90));
    setPan(pan);
  }

  motionBtn.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') startMotion();
        else motionHint.textContent = 'Motion permission denied.';
      } catch(e) {
        motionHint.textContent = 'Could not enable motion.';
      }
    } else if (window.DeviceOrientationEvent) {
      startMotion();
    } else {
      motionHint.textContent = 'Motion not supported on this device.';
    }
  });

  function startMotion() {
    motionBtn.style.display = 'none';
    motionHint.textContent = 'Sweep left or right — the sound will follow';
    window.addEventListener('deviceorientation', handleOrientation);
  }
</script>
</body>
</html>
