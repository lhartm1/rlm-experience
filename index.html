<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Dancehall on the Bayou</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d0800;
    font-family: 'Georgia', serif;
    color: #f0e8d0;
    touch-action: none;
  }

  #bg {
    position: fixed;
    inset: 0;
    background-image: url('708616044_1631812425451533_4297030253631931157_n.jpg');
    background-size: cover;
    background-position: center 30%;
    filter: brightness(0.38) sepia(0.25);
    z-index: 0;
    transition: filter 0.8s ease;
  }

  #bg.playing {
    filter: brightness(0.52) sepia(0.18);
  }

  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, transparent 20%, rgba(5,2,0,0.78) 80%);
    z-index: 1;
  }

  #ui {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 52px 28px 44px;
  }

  #title { text-align: center; }

  #eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #9a7c50;
    margin-bottom: 10px;
  }

  #main-title {
    font-size: 26px;
    font-weight: normal;
    line-height: 1.25;
    color: #f5e8cc;
    letter-spacing: 0.02em;
  }

  #main-title em {
    font-style: italic;
    color: #c8a060;
  }

  #center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  #play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(200, 160, 80, 0.45);
    background: rgba(10, 5, 0, 0.55);
    color: #c8a060;
    font-size: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  #play-btn:active {
    background: rgba(40, 20, 0, 0.7);
    border-color: rgba(200, 160, 80, 0.8);
  }

  #progress-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  #progress-track {
    width: 100%;
    height: 2px;
    background: rgba(200, 160, 80, 0.15);
    border-radius: 1px;
    cursor: pointer;
    position: relative;
  }

  #progress-fill {
    height: 100%;
    background: #c8a060;
    border-radius: 1px;
    width: 0%;
    transition: width 0.15s linear;
  }

  #time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #7a6040;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }

  /* COMPASS SECTION */
  #motion-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Landscape instruction */
  #orientation-hint {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(200,160,80,0.07);
    border: 1px solid rgba(200,160,80,0.18);
    border-radius: 10px;
    padding: 10px 16px;
    width: 100%;
  }

  #phone-icon {
    flex-shrink: 0;
  }

  #orientation-text {
    font-size: 11px;
    color: #b89060;
    line-height: 1.5;
    letter-spacing: 0.03em;
  }

  /* Compass rose */
  #compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #compass {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid rgba(200,160,80,0.25);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #compass-needle {
    width: 2px;
    height: 28px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) translateY(-100%) rotate(0deg);
    transition: transform 0.1s ease;
  }

  #compass-needle-top {
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 16px solid #c8a060;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-needle-bottom {
    width: 2px;
    height: 14px;
    background: #5a4030;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(200,160,80,0.4);
    position: absolute;
  }

  #compass-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7a6040;
  }

  #pan-readout {
    font-size: 10px;
    color: #5a4030;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
  }

  #motion-btn {
    padding: 9px 22px;
    border-radius: 20px;
    border: 1px solid rgba(200, 160, 80, 0.3);
    background: rgba(10, 5, 0, 0.45);
    color: #c8a060;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    font-family: 'Georgia', serif;
    -webkit-tap-highlight-color: transparent;
  }

  #motion-hint {
    font-size: 11px;
    color: #7a6040;
    text-align: center;
    line-height: 1.5;
    min-height: 16px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="vignette"></div>

<div id="ui">
  <div id="title">
    <div id="eyebrow">An immersive listening experience</div>
    <h1 id="main-title">A Dancehall<br>on the <em>Bayou</em></h1>
  </div>

  <div id="center">
    <button id="play-btn" aria-label="Play">&#9654;</button>
    <div id="progress-area">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="time-row">
        <span id="t-current">0:00</span>
        <span id="t-total">--:--</span>
      </div>
    </div>
  </div>

  <div id="motion-area">

    <div id="orientation-hint">
      <!-- Phone rotated to landscape SVG icon -->
      <svg id="phone-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Phone in landscape orientation -->
        <rect x="4" y="11" width="28" height="14" rx="3" stroke="#c8a060" stroke-width="1.5" fill="none"/>
        <circle cx="7.5" cy="18" r="1.5" fill="#c8a060" opacity="0.5"/>
        <!-- rotation arrows -->
        <path d="M15 6 Q18 3 21 6" stroke="#c8a060" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M21 6 L20 4M21 6 L23 5.2" stroke="#c8a060" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M21 30 Q18 33 15 30" stroke="#c8a060" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M15 30 L16 32M15 30 L13 30.8" stroke="#c8a060" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div id="orientation-text">Hold phone <strong>horizontally</strong> and turn your body to pan the sound</div>
    </div>

    <div id="compass-wrap">
      <div id="compass">
        <div id="compass-needle">
          <div id="compass-needle-top"></div>
          <div id="compass-needle-bottom"></div>
        </div>
        <div id="compass-dot"></div>
      </div>
      <div id="compass-label">Compass</div>
      <div id="pan-readout">Center</div>
    </div>

    <button id="motion-btn">Enable motion control</button>
    <div id="motion-hint">Turn to find the music</div>

  </div>
</div>

<audio id="audio" src="11_dance_hall.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const bg = document.getElementById('bg');
  const playBtn = document.getElementById('play-btn');
  const progressFill = document.getElementById('progress-fill');
  const progressTrack = document.getElementById('progress-track');
  const tCurrent = document.getElementById('t-current');
  const tTotal = document.getElementById('t-total');
  const compassNeedle = document.getElementById('compass-needle');
  const panReadout = document.getElementById('pan-readout');
  const motionBtn = document.getElementById('motion-btn');
  const motionHint = document.getElementById('motion-hint');

  // Web Audio
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const panner = ctx.createStereoPanner();
  const src = ctx.createMediaElementSource(audio);
  src.connect(panner);
  panner.connect(ctx.destination);

  let motionEnabled = false;
  let useAlpha = false;
  let alphaOffset = null; // calibration: first reading = center

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', () => {
    tTotal.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    tCurrent.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    playBtn.innerHTML = '&#9654;';
    bg.classList.remove('playing');
  });

  playBtn.addEventListener('click', () => {
    if (ctx.state === 'suspended') ctx.resume();
    if (audio.paused) {
      audio.play();
      playBtn.innerHTML = '&#9646;&#9646;';
      bg.classList.add('playing');
    } else {
      audio.pause();
      playBtn.innerHTML = '&#9654;';
      bg.classList.remove('playing');
    }
  });

  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  function setPan(val) {
    val = Math.max(-1, Math.min(1, val));
    panner.pan.value = val;
    // rotate needle: -90deg = full left, 0 = center, +90deg = full right
    const deg = val * 90;
    compassNeedle.style.transform = `translateX(-50%) translateY(-100%) rotate(${deg}deg)`;
    if (val < -0.1) panReadout.textContent = 'Left';
    else if (val > 0.1) panReadout.textContent = 'Right';
    else panReadout.textContent = 'Center';
  }

  setPan(0);

  function handleOrientation(e) {
    if (!motionEnabled) return;

    if (useAlpha && e.alpha !== null) {
      // Calibrate on first reading
      if (alphaOffset === null) alphaOffset = e.alpha;
      let delta = e.alpha - alphaOffset;
      // Wrap to -180..180
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;
      // Map ±90 degrees of turn to ±1 pan
      const pan = Math.max(-1, Math.min(1, delta / 90));
      setPan(pan);
    } else {
      // Fallback: gamma (tilt left/right) for landscape
      const gamma = e.gamma || 0;
      setPan(gamma / 45);
    }
  }

  motionBtn.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') startMotion();
        else motionHint.textContent = 'Motion permission denied.';
      } catch(e) {
        motionHint.textContent = 'Could not enable motion.';
      }
    } else if (window.DeviceOrientationEvent) {
      startMotion();
    } else {
      motionHint.textContent = 'Motion not supported on this device.';
    }
  });

  function startMotion() {
    motionEnabled = true;
    motionBtn.style.display = 'none';

    // Test if alpha is available and meaningful
    const testHandler = (e) => {
      if (e.alpha !== null && e.alpha !== undefined) {
        useAlpha = true;
        motionHint.textContent = 'Turn your body — the sound will follow';
      } else {
        useAlpha = false;
        motionHint.textContent = 'Tilt left or right to pan';
      }
      window.removeEventListener('deviceorientation', testHandler);
      window.addEventListener('deviceorientation', handleOrientation);
    };

    window.addEventListener('deviceorientation', testHandler);
  }
</script>
</body>
</html>
