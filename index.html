<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Dancehall on the Bayou</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { background: #0d0800; }

  body {
    font-family: 'Georgia', serif;
    color: #f0e8d0;
    background: transparent;
    min-height: 100vh;
  }

  /* Fixed background layer — pointer-events off so it never blocks scroll or taps */
  #bg {
    position: fixed;
    inset: 0;
    background-image: url('708616044_1631812425451533_4297030253631931157_n.jpg');
    background-size: cover;
    background-position: center 30%;
    z-index: 0;
    pointer-events: none;
  }

  /* Dark overlay */
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(5, 2, 0, 0.62);
  }

  /* Scrollable content sits above fixed bg */
  #ui {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 28px 80px;
    gap: 52px;
  }

  #title { text-align: center; }

  #eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d4aa70;
    margin-bottom: 10px;
  }

  #main-title {
    font-size: 28px;
    font-weight: normal;
    line-height: 1.25;
    color: #fff8ee;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.9);
  }

  #main-title em {
    font-style: italic;
    color: #f0c070;
  }

  #center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 320px;
  }

  #play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(240, 200, 100, 0.6);
    background: rgba(10, 5, 0, 0.65);
    color: #f0c070;
    font-size: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  #progress-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  #progress-track {
    width: 100%;
    height: 3px;
    background: rgba(240, 200, 100, 0.2);
    border-radius: 2px;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: #f0c070;
    border-radius: 2px;
    width: 0%;
  }

  #time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #c8a060;
    font-family: 'Courier New', monospace;
  }

  #motion-area {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  #orientation-hint {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(240,200,100,0.09);
    border: 1px solid rgba(240,200,100,0.28);
    border-radius: 10px;
    padding: 14px 16px;
    width: 100%;
  }

  #orientation-text {
    font-size: 13px;
    color: #ffe8b0;
    line-height: 1.55;
  }

  #orientation-text strong { color: #ffffff; }

  #compass-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #compass {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid rgba(240,200,100,0.3);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #compass-needle {
    width: 2px;
    height: 28px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) translateY(-100%) rotate(0deg);
  }

  #needle-top {
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 16px solid #f0c070;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #needle-bottom {
    width: 2px;
    height: 14px;
    background: #6a5040;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  #compass-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(240,200,100,0.5);
  }

  #compass-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c8a060;
  }

  #pan-readout {
    font-size: 12px;
    color: #d4aa70;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
  }

  #motion-btn {
    padding: 13px 30px;
    border-radius: 24px;
    border: 1px solid rgba(240, 200, 100, 0.45);
    background: rgba(10, 5, 0, 0.65);
    color: #f0c070;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: 'Georgia', serif;
    -webkit-tap-highlight-color: transparent;
  }

  #motion-hint {
    font-size: 12px;
    color: #c8a060;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="bg"></div>

<div id="ui">
  <div id="title">
    <div id="eyebrow">An immersive listening experience</div>
    <h1 id="main-title">A Dancehall<br>on the <em>Bayou</em></h1>
  </div>

  <div id="center">
    <button id="play-btn" aria-label="Play">&#9654;</button>
    <div id="progress-area">
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <div id="time-row">
        <span id="t-current">0:00</span>
        <span id="t-total">--:--</span>
      </div>
    </div>
  </div>

  <div id="motion-area">
    <div id="orientation-hint">
      <svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect x="8" y="12" width="28" height="12" rx="2.5" stroke="#f0c070" stroke-width="1.4" fill="none"/>
        <circle cx="33" cy="18" r="1.2" fill="#f0c070" opacity="0.6"/>
        <path d="M7 18 Q3 10 7 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M7 4 L5 7 M7 4 L10 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <path d="M37 18 Q41 10 37 4" stroke="#f0c070" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M37 4 L39 7 M37 4 L34 5.5" stroke="#f0c070" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <div id="orientation-text">Move your phone left or right to slide the pan position</div>
    </div>

    <div id="compass-wrap">
      <div id="compass">
        <div id="compass-needle">
          <div id="needle-top"></div>
          <div id="needle-bottom"></div>
        </div>
        <div id="compass-dot"></div>
      </div>
      <div id="compass-label">Direction</div>
      <div id="pan-readout">Center</div>
    </div>

    <button id="motion-btn">Enable motion control</button>
    <div id="motion-hint">Move left or right to slide the music through the stereo field</div>
  </div>
</div>

<audio id="audio" src="11_dance_hall.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const progressFill = document.getElementById('progress-fill');
  const progressTrack = document.getElementById('progress-track');
  const tCurrent = document.getElementById('t-current');
  const tTotal = document.getElementById('t-total');
  const compassNeedle = document.getElementById('compass-needle');
  const panReadout = document.getElementById('pan-readout');
  const motionBtn = document.getElementById('motion-btn');
  const motionHint = document.getElementById('motion-hint');

  const actx = new (window.AudioContext || window.webkitAudioContext)();
  const panner = actx.createStereoPanner();
  const src = actx.createMediaElementSource(audio);
  src.connect(panner);
  panner.connect(actx.destination);

  let smoothedPan = 0;
  const SMOOTHING = 0.88;

  // Continuous pan position. This is intentionally persistent:
  // motion changes it, but it does not drift back to center.
  let panPosition = 0;

  // Landscape left/right movement is often the y axis.
  // If it feels backward, change MOTION_SIGN from 1 to -1.
  const MOTION_AXIS = 'y';
  const MOTION_SIGN = 1;

  // TUNING VALUES
  // Lower DEADZONE = smaller gestures are noticed.
  // Higher PAN_SPEED = smaller physical gestures move the pan farther.
  // Higher MOTION_SMOOTHING = less twitchy, but a little slower to respond.
  const DEADZONE = 0.38;
  const PAN_SPEED = 0.72;       // pan units per second at strong motion
  const MOTION_RANGE = 2.6;     // expected useful motion range after filtering
  const MAX_STEP = 0.025;       // max pan change per sensor event
  const MOTION_SMOOTHING = 0.84;
  const BASELINE_SMOOTHING = 0.985;

  // This suppresses the little opposite-direction bump that happens when
  // your hand stops moving and the phone decelerates.
  const REVERSAL_SUPPRESS_MS = 220;
  const REVERSAL_THRESHOLD = 0.95;

  // Rolling baseline removes the steady gravity/orientation component,
  // leaving mostly the left/right motion impulse.
  let motionBaseline = 0;
  let filteredMotion = 0;
  let lastMotionTime = 0;
  let lastIntentSign = 0;
  let lastIntentTime = 0;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', () => { tTotal.textContent = fmt(audio.duration); });
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    tCurrent.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('ended', () => { playBtn.innerHTML = '&#9654;'; });

  playBtn.addEventListener('click', () => {
    if (actx.state === 'suspended') actx.resume();
    if (audio.paused) {
      audio.play();
      playBtn.innerHTML = '&#9646;&#9646;';
    } else {
      audio.pause();
      playBtn.innerHTML = '&#9654;';
    }
  });

  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  function setPan(val) {
    val = Math.max(-1, Math.min(1, val));
    smoothedPan = smoothedPan * SMOOTHING + val * (1 - SMOOTHING);
    panner.pan.value = smoothedPan;
    const deg = smoothedPan * 90;
    compassNeedle.style.transform = `translateX(-50%) translateY(-100%) rotate(${deg}deg)`;
    panReadout.textContent = smoothedPan < -0.1 ? 'Left' : smoothedPan > 0.1 ? 'Right' : 'Center';
  }

  function handleMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const rawAxis = a[MOTION_AXIS];
    if (rawAxis === null || rawAxis === undefined) return;

    const now = performance.now();
    const dt = lastMotionTime ? Math.min((now - lastMotionTime) / 1000, 0.05) : 0.016;
    lastMotionTime = now;

    // Remove slow gravity/orientation offset so holding the phone still
    // does not keep pushing the pan. This baseline moves very slowly.
    motionBaseline = motionBaseline * BASELINE_SMOOTHING + rawAxis * (1 - BASELINE_SMOOTHING);
    const unfilteredMotion = (rawAxis - motionBaseline) * MOTION_SIGN;

    // Smooth the motion signal before deciding whether it is intentional.
    filteredMotion = filteredMotion * MOTION_SMOOTHING + unfilteredMotion * (1 - MOTION_SMOOTHING);

    const absMotion = Math.abs(filteredMotion);
    const sign = Math.sign(filteredMotion);

    if (absMotion > DEADZONE) {
      const justReversed =
        sign !== 0 &&
        lastIntentSign !== 0 &&
        sign !== lastIntentSign &&
        (now - lastIntentTime) < REVERSAL_SUPPRESS_MS &&
        absMotion < REVERSAL_THRESHOLD;

      if (!justReversed) {
        // Map the filtered motion into a smaller, more playable gesture field.
        // A smaller MOTION_RANGE makes smaller gestures move the pan more.
        const normalized = Math.min(1, (absMotion - DEADZONE) / (MOTION_RANGE - DEADZONE));
        let delta = sign * normalized * PAN_SPEED * dt;
        delta = Math.max(-MAX_STEP, Math.min(MAX_STEP, delta));

        panPosition += delta;
        panPosition = Math.max(-1, Math.min(1, panPosition));

        lastIntentSign = sign;
        lastIntentTime = now;
      }
    }

    setPan(panPosition);

    motionHint.textContent =
      `axis: ${MOTION_AXIS} | raw: ${unfilteredMotion.toFixed(2)} | smooth: ${filteredMotion.toFixed(2)} | pan: ${panPosition.toFixed(2)}`;

    audio.volume = 1;
  }


  compassNeedle.parentElement.addEventListener('click', () => {
    panPosition = 0;
    setPan(panPosition);
    motionHint.textContent = 'Centered. Move left or right to slide the pan again.';
  });

  motionBtn.addEventListener('click', async () => {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceMotionEvent.requestPermission();
        if (perm === 'granted') startMotion();
        else motionHint.textContent = 'Motion permission denied.';
      } catch(e) {
        motionHint.textContent = 'Could not enable motion.';
      }
    } else if (window.DeviceMotionEvent) {
      startMotion();
    } else {
      motionHint.textContent = 'Motion not supported on this device.';
    }
  });

  function startMotion() {
    motionBtn.style.display = 'none';
    motionHint.textContent = 'Move left or right — the pan will slide and stay where you leave it';
    window.addEventListener('devicemotion', handleMotion);
  }
</script>
</body>
</html>
